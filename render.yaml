# Render Blueprint Specification for Sales Intelligence System
# Use "New > Blueprint Route" on Render dashboard and connect your repository.

services:
  # 1. Backend Web Service (FastAPI)
  - type: web
    name: sales-optima-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: sales-optima-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sales-optima-redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.5
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256

  # 2. Frontend Static Site (React/Vite)
  - type: web
    name: sales-optima-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    publishDir: frontend/dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sales-optima-backend
          property: url

# 3. Database Resource (PostgreSQL)
databases:
  - name: sales-optima-db
    plan: free

# 4. Cache Resource (Redis)
redis:
  - name: sales-optima-redis
    plan: free
    ipAllowList: [] # Restrict access to internal services only

